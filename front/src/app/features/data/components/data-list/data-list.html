<div class="dashboard">
  <div class="dataList">
    @for (dataItem of data$ | async; track $index) {
      <app-card>
        <app-data-item [dataValue]="dataItem" (select)="onSelect($event)"></app-data-item>
      </app-card>
    }
  </div>
  <div>
    @if (dataSelected) {
      <app-data-detail></app-data-detail>
    } @else {
      <p>Select a data to see their detail!</p>
    }
  </div>
</div>
